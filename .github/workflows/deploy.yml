name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # =========================================================================
  # Quality Gate: Lint + Build verification (GitHub-hosted runner)
  # =========================================================================
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build verification (populates Turbo remote cache)
        run: pnpm turbo run build --filter=booking-engine-admin
        env:
          VITE_API_BASE_URL: https://api.maxirez.com/api
          VITE_SOCKET_URL: https://api.maxirez.com
          VITE_IMAGES_URL: https://images.maxirez.com
          VITE_PAYMENT_API_URL: https://api.maxirez.com/payment-api
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

  # =========================================================================
  # Deploy: Self-hosted runner on production server
  # No SSH needed - runner runs directly on the server
  # =========================================================================
  deploy:
    name: Deploy
    needs: quality
    runs-on: [self-hosted, production]

    steps:
      - name: Pull latest code
        run: |
          cd /var/www/booking-engine
          sudo git fetch origin main || { echo "Git fetch failed"; exit 1; }
          sudo git reset --hard origin/main
          echo "Code updated to $(sudo git rev-parse --short HEAD)"

      - name: Install dependencies
        run: |
          cd /var/www/booking-engine
          sudo pnpm install --frozen-lockfile

      - name: Build admin frontend
        run: |
          cd /var/www/booking-engine
          sudo VITE_API_BASE_URL=https://api.maxirez.com/api \
               VITE_SOCKET_URL=https://api.maxirez.com \
               VITE_IMAGES_URL=https://images.maxirez.com \
               VITE_PAYMENT_API_URL=https://api.maxirez.com/payment-api \
               VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }} \
               pnpm turbo run build --filter=booking-engine-admin

      - name: Build and restart Docker containers
        run: |
          cd /var/www
          sudo docker compose build booking-api payment-service || { echo "Docker build failed"; exit 1; }
          sudo docker compose up -d booking-api payment-service || { echo "Docker up failed"; exit 1; }
          echo "Deploy completed at $(date)"

      - name: Post-deploy health check
        run: |
          echo "Waiting 20s for containers to start..."
          sleep 20

          # Liveness check
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.maxirez.com/health || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Liveness check passed (HTTP $HTTP_STATUS)"
          else
            echo "Liveness check FAILED (HTTP $HTTP_STATUS)"
            exit 1
          fi

          # Readiness check
          RESPONSE=$(curl -s --max-time 10 https://api.maxirez.com/health/ready || echo '{}')
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.maxirez.com/health/ready || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Readiness check passed (HTTP $HTTP_STATUS)"
          else
            echo "Readiness check warning (HTTP $HTTP_STATUS) - service may still be initializing"
            echo "Response: $RESPONSE"
          fi

          echo "All health checks completed"
