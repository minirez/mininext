name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - api
          - admin
          - site
          - payment
          - all

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # =========================================================================
  # Quality Gate: Lint + Build verification (GitHub-hosted runner)
  # =========================================================================
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build verification
        run: pnpm turbo run build --filter=booking-engine-admin
        env:
          VITE_API_BASE_URL: https://api.maxirez.com/api
          VITE_SOCKET_URL: https://api.maxirez.com
          VITE_IMAGES_URL: https://images.maxirez.com
          VITE_PAYMENT_API_URL: https://api.maxirez.com/payment-api
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

  # =========================================================================
  # Deploy: Self-hosted runner on production server
  # =========================================================================
  deploy:
    name: Deploy
    needs: quality
    runs-on: [self-hosted, production]

    steps:
      - name: Pull latest code
        run: |
          cd /var/www/booking-engine
          sudo git fetch origin main || { echo "Git fetch failed"; exit 1; }
          sudo git reset --hard origin/main
          echo "Code updated to $(sudo git rev-parse --short HEAD)"

      - name: Detect changed paths
        id: changes
        run: |
          cd /var/www/booking-engine
          TARGET="${{ github.event.inputs.target || 'auto' }}"

          if [ "$TARGET" = "all" ]; then
            echo "api=true" >> $GITHUB_OUTPUT
            echo "admin=true" >> $GITHUB_OUTPUT
            echo "packages=true" >> $GITHUB_OUTPUT
            echo "payment=true" >> $GITHUB_OUTPUT
            echo "site=true" >> $GITHUB_OUTPUT
            echo "Manual deploy: all targets"
          elif [ "$TARGET" != "auto" ]; then
            # Single target override
            for t in api admin packages payment site; do
              if [ "$t" = "$TARGET" ]; then
                echo "$t=true" >> $GITHUB_OUTPUT
              else
                echo "$t=false" >> $GITHUB_OUTPUT
              fi
            done
            echo "Manual deploy: $TARGET only"
          else
            # Auto-detect from changed files
            PREV=$(sudo git rev-parse HEAD~1 2>/dev/null || echo "")
            if [ -z "$PREV" ]; then
              echo "api=true" >> $GITHUB_OUTPUT
              echo "admin=true" >> $GITHUB_OUTPUT
              echo "packages=true" >> $GITHUB_OUTPUT
              echo "payment=true" >> $GITHUB_OUTPUT
              echo "site=true" >> $GITHUB_OUTPUT
            else
              CHANGED=$(sudo git diff --name-only "$PREV" HEAD)
              echo "$CHANGED"
              echo "api=$(echo "$CHANGED" | grep -q '^apps/api/' && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "admin=$(echo "$CHANGED" | grep -q '^apps/admin/' && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "packages=$(echo "$CHANGED" | grep -q '^packages/' && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "payment=$(echo "$CHANGED" | grep -q '^apps/payment-service/' && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "site=$(echo "$CHANGED" | grep -q '^apps/site/\|^Dockerfile.site' && echo true || echo false)" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Install dependencies
        if: steps.changes.outputs.admin == 'true' || steps.changes.outputs.packages == 'true'
        run: |
          cd /var/www/booking-engine
          sudo pnpm install --frozen-lockfile

      - name: Build admin frontend
        if: steps.changes.outputs.admin == 'true' || steps.changes.outputs.packages == 'true'
        run: |
          cd /var/www/booking-engine
          sudo VITE_API_BASE_URL=https://api.maxirez.com/api \
               VITE_SOCKET_URL=https://api.maxirez.com \
               VITE_IMAGES_URL=https://images.maxirez.com \
               VITE_PAYMENT_API_URL=https://api.maxirez.com/payment-api \
               VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }} \
               pnpm turbo run build --filter=booking-engine-admin

      - name: Build and restart API
        if: steps.changes.outputs.api == 'true' || steps.changes.outputs.packages == 'true'
        run: |
          cd /var/www
          sudo docker compose build booking-api || { echo "Docker build failed"; exit 1; }
          sudo docker compose up -d booking-api || { echo "Docker up failed"; exit 1; }
          echo "API restarted at $(date)"

      - name: Build and restart Payment Service
        if: steps.changes.outputs.payment == 'true' || steps.changes.outputs.packages == 'true'
        run: |
          cd /var/www
          sudo docker compose build payment-service || { echo "Docker build failed"; exit 1; }
          sudo docker compose up -d payment-service || { echo "Docker up failed"; exit 1; }
          echo "Payment service restarted at $(date)"

      - name: Build and restart Site
        if: steps.changes.outputs.site == 'true' || steps.changes.outputs.packages == 'true'
        run: |
          cd /var/www
          sudo docker compose build booking-site || { echo "Docker build failed"; exit 1; }
          sudo docker compose up -d booking-site || { echo "Docker up failed"; exit 1; }
          echo "Site restarted at $(date)"
          # Health check
          echo "Waiting for Site to be ready..."
          for i in $(seq 1 12); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:3002/ || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Site healthy (HTTP $HTTP_STATUS) after attempt $i"
              break
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS - waiting 5s..."
            if [ "$i" = "12" ]; then
              echo "Site health check FAILED after 60s (HTTP $HTTP_STATUS)"
              sudo docker logs maxirez-booking-site --tail 20
              exit 1
            fi
            sleep 5
          done

      - name: Post-deploy health check
        if: steps.changes.outputs.api == 'true' || steps.changes.outputs.packages == 'true'
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 12); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.maxirez.com/health || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "API healthy (HTTP $HTTP_STATUS) after ${i}0s"
              break
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS - waiting 10s..."
            if [ "$i" = "12" ]; then
              echo "Health check FAILED after 120s (HTTP $HTTP_STATUS)"
              sudo docker logs maxirez-booking-api --tail 20
              exit 1
            fi
            sleep 10
          done
          echo "Deploy completed successfully"

      - name: Deploy summary
        run: |
          echo "=== Deploy Summary ==="
          echo "Target: ${{ github.event.inputs.target || 'auto' }}"
          echo "API changed: ${{ steps.changes.outputs.api }}"
          echo "Admin changed: ${{ steps.changes.outputs.admin }}"
          echo "Packages changed: ${{ steps.changes.outputs.packages }}"
          echo "Payment changed: ${{ steps.changes.outputs.payment }}"
          echo "Site changed: ${{ steps.changes.outputs.site }}"
          echo "======================"
